<!doctype html>
<html lang="es">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Clínica Salud+ | Iniciar Sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="title" content="Clínica Salud+ | Registro para Turnos Médicos" />
    <meta name="author" content="Clínica Salud+" />
    <meta
      name="description"
      content="Inicia sesión en el sistema de Clínica Salud+ para gestionar tus turnos médicos o acceder al panel de administración."
    />
    <meta
      name="keywords"
      content="turnos médicos, iniciar sesión, sistema de turnos, paciente, administrador, gestión médica, Clínica Salud+"
    />
    <meta name="supported-color-schemes" content="light dark" />
    <link rel="preload" href="/css/adminlte.css" as="style" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q="
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/adminlte.css" />
    </head>
  <body class="login-page bg-body-secondary">
    <div class="login-box">
      <div class="login-logo">
        <a href=".../index.html"><b>Clínica </b>Salud+</a>
      </div>
      <div class="card">
        <div class="card-body login-card-body">
          <p class="login-box-msg">Iniciá sesión para comenzar</p>
          <form id="login-form" method="post" action="/api/login" onsubmit="event.preventDefault()">
            <div class="input-group mb-3">
              <input type="email" class="form-control" placeholder="Email" id="log-email" required />
              <div class="input-group-text"><span class="bi bi-envelope"></span></div>
            </div>
            <div class="input-group mb-3">
              <input type="password" class="form-control" placeholder="Contraseña" id="log-password" required />
              <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
            </div>
            <div class="row">
              <div class="col-8">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" />
                  <label class="form-check-label" for="flexCheckDefault"> Recordarme </label>
                </div>
              </div>
              <div class="col-4">
                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary" id="log-button">Ingresar</button>
                </div>
              </div>
              </div>
            </form>
          <p class="mb-0 text-center mt-3">
            ¿No tenés cuenta? 
            <a href="register.html" class="text-center"> Registrate acá </a>
          </p>
        </div>
        </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="/js/adminlte.js"></script>
    <script type="module" src="/js/modules/login.js"></script>
    
  </body>
  </html>
