<!doctype html>
<html lang="es">
  <!--begin::Head-->
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Clínica Salud+ | Iniciar Sesión</title>
    <!--begin::Accessibility Meta Tags-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <!--end::Accessibility Meta Tags-->
    <!--begin::Primary Meta Tags-->
    <meta name="title" content="Clínica Salud+ | Registro para Turnos Médicos" />
    <meta name="author" content="Clínica Salud+" />
    <meta
      name="description"
      content="Inicia sesión en el sistema de Clínica Salud+ para gestionar tus turnos médicos o acceder al panel de administración."
    />
    <meta
      name="keywords"
      content="turnos médicos, iniciar sesión, sistema de turnos, paciente, administrador, gestión médica, Clínica Salud+"
    />
    <!--end::Primary Meta Tags-->
    <!--begin::Accessibility Features-->
    <!-- Skip links will be dynamically added by accessibility.js -->
    <meta name="supported-color-schemes" content="light dark" />
    <link rel="preload" href="/css/adminlte.css" as="style" />
    <!--end::Accessibility Features-->
    <!--begin::Fonts-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q="
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <!--end::Fonts-->
    <!--begin::Third Party Plugin(OverlayScrollbars)-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <!--end::Third Party Plugin(OverlayScrollbars)-->
    <!--begin::Third Party Plugin(Bootstrap Icons)-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <!--end::Third Party Plugin(Bootstrap Icons)-->
    <!--begin::Required Plugin(AdminLTE)-->
    <link rel="stylesheet" href="/css/adminlte.css" />
    <!--end::Required Plugin(AdminLTE)-->
  </head>
  <!--end::Head-->
  <!--begin::Body-->
  <body class="login-page bg-body-secondary">
    <div class="login-box">
      <div class="login-logo">
        <a href="/index.html"><b>Clínica</b> Salud+</a>
      </div>

      <div class="card">
        <div class="card-body login-card-body">
          <p class="login-box-msg">Inicia sesión para gestionar tus turnos</p>

          <!-- Form: IDs deben coincidir con js/modules/login.js -->
          <form id="login-form" method="post" action="/api/login" onsubmit="event.preventDefault()">
            <div class="input-group mb-3">
              <input type="email" id="log-email" name="email" class="form-control" placeholder="Email" required />
              <div class="input-group-text"><span class="bi bi-envelope"></span></div>
            </div>

            <div class="input-group mb-3">
              <input type="password" id="log-password" name="password" class="form-control" placeholder="Contraseña" required />
              <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
            </div>

            <div class="row">
              <div class="col-12 d-flex justify-content-center">
                <div class="d-grid" style="max-width:220px;">
                  <button id="log-button" type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                </div>
              </div>
            </div>
          </form>

          <p class="mb-4 text-center mt-2">
            <a href="register.html" class="text-center">Crear cuenta</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="/js/adminlte.js"></script>
    <script type="module" src="/js/modules/login.js"></script>
  </body>
</html>
