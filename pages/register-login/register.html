  <!--begin::Body-->
  <body class="register-page bg-body-secondary">
    <div class="register-box">
      <div class="register-logo">
        <a href=".../index.html"><b>Clínica </b>Salud+</a>
      </div>
      <!-- /.register-logo -->
      <div class="card">
        <div class="card-body register-card-body">
          <p class="register-box-msg">Creá una cuenta como nuevo paciente</p>
          <form action=".../index.html" method="post">
            <div class="input-group mb-3">
              <input type="text" class="form-control" placeholder="Nombre Completo" />
              <div class="input-group-text"><span class="bi bi-person"></span></div>
            </div>
            <div class="input-group mb-3">
              <input type="email" class="form-control" placeholder="Email" />
              <div class="input-group-text"><span class="bi bi-envelope"></span></div>
            </div>
            <div class="input-group mb-3">
              <input type="password" class="form-control" placeholder="Contraseña" />
              <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
            </div>
              <!-- /.col -->
              <div class="col-12 d-flex justify-content-center">
                <div class="d-grid" style="max-width:220px;">
                  <button type="submit" class="btn btn-primary w-100">Registrarme</button>
                </div>
              </div>
              <!-- /.col -->
            </div>
            <!--end::Row-->
          <p class="mb-4 text-center mt-2">
                <a href="login.html" class="text-center"> Ya tengo una cuenta </a>
            </p>
        </div>
        <!-- /.register-card-body -->
      </div>
    </div>
    <!-- /.register-box -->
    <!--begin::Third Party Plugin(OverlayScrollbars)-->
    <script

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
