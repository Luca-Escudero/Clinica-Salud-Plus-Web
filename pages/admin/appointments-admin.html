        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="preload" href="/css/adminlte.css" as="style" />
    <link rel="stylesheet" href="/css/adminlte.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
        integrity="sha512-1ycn6IcaQQ40B7rT/P5wK/tL45jDAB5A9aU6W5jPz5KzFwA3X4wLhCqg0F2gT8k6/A7eB9/j6R6O2xKxO6g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/apexcharts@3.37.1/dist/apexcharts.css"
        integrity="sha256-4MX+61mt9NVvvuPjUWdUdyfZfxSB1/Rf9WtqRHgG5S0=" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        crossorigin="anonymous" />
</head>

<body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
    <div class="app-wrapper">
        <nav class="app-header navbar navbar-expand bg-body">
            <div class="container-fluid">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
                            <i class="bi bi-list"></i>
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown user-menu">
                        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                            <img src="/assets/img/user1-128x128.jpg" class="user-image rounded-circle shadow"
                                alt="Imagen de Usuario" />
                            <span class="d-none d-md-inline">Admin</span>
                        </a>

                        <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-end">
                            <li class="user-header bg-light text-dark" style="padding: 10px 10px;">
                                <img src="/assets/img/user1-128x128.jpg" class="rounded-circle shadow"
                                    alt="Imagen de Usuario" style="width: 60px; height: 60px; margin-bottom: 5px;" />
                                <p class="mb-0">
                                    Admin
                                </p>
                            </li>

                            <li class="user-footer">
                                <div class="d-grid">
                                    <a href="/pages/register-login/login.html" class="btn btn-danger w-100"
                                        id="logout-button">Cerrar Sesión</a>
                                </div>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </nav>

        <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
            <div class="sidebar-brand">
                <a href="/index.html" class="brand-link">
                    <img src="/assets/img/logo.png" alt="Logo" class="brand-image opacity-75 shadow" />

                </a>
            </div>
            <div class="sidebar-wrapper">
                <nav class="mt-2">
                    <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="navigation"
                        aria-label="Main navigation" data-accordion="false" id="navigation">

                        <li class="nav-item">
                            <a href="home-admin.html" class="nav-link" data-content-id="dashboard-view">
                                <i class="nav-icon bi bi-speedometer2"></i>
                                <p>Dashboard</p>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="manage-doctors.html" class="nav-link" data-content-id="doctors-view">
                                <i class="nav-icon bi bi-person-badge-fill"></i>
                                <p>Administrar Doctores</p>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="appointments-admin.html" class="nav-link active" data-content-id="appointments-view">
                                <i class="nav-icon bi bi-calendar-check"></i>
                                <p>Administrar Citas</p>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="manage-user.html" class="nav-link" data-content-id="users-view">
                                <i class="nav-icon bi bi-people-fill"></i>
                                <p>Administrar Usuarios</p>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <main class="app-main">
            <div class="app-content-header">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-sm-6">
                            <h3 class="mb-0" id="main-title">Administrar Citas</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="container-fluid">
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Todas las Citas</h3>
                                <div class="card-tools">
                                </div>
                            </div>

                            <div class="card-body p-0">

                                <table class="table table-striped">
                                    <thead>
                                        <tr>
                                            <th style="width: 20%;">Paciente</th>
                                            <th style="width: 20%;">Doctor</th>
                                            <th style="width: 35%;">Fecha y Hora</th>
                                            <th style="width: 15%;">Estado</th>
                                            <th style="width: 10%;">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="citasTableBody">

                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
